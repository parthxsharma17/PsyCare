name: Build and deploy Node.js app to Azure Web App - mindspace

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      # ✅ Run commands ONLY inside Backend
      - name: Install, build, test (Backend)
        working-directory: ./Backend
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      # ✅ Upload only Backend folder
      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: Backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C3A45BA1A71F4909844739A4D0D0C823 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_359A2F0A21AA4DBA9A32E33CA842638D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4AEE327AF5A142AFB1FD27C8875F4900 }}

      # ✅ Deploy only Backend content
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mindspace'
          slot-name: 'Production'
          package: .