name: Build and deploy Node.js Backend to Azure Web App - mindspace

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: mindspace-backend-production
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./Backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Prepare backend deploy package
        working-directory: .
        run: |
          rm -rf deploy
          mkdir deploy
          rsync -av \
            --exclude '.env' \
            --exclude 'node_modules' \
            --exclude 'MoodModel' \
            --exclude '*.log' \
            Backend/ deploy/
          cd deploy
          npm ci --omit=dev

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: deploy
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app
          path: ./deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C3A45BA1A71F4909844739A4D0D0C823 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_359A2F0A21AA4DBA9A32E33CA842638D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4AEE327AF5A142AFB1FD27C8875F4900 }}

      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: mindspace
          slot-name: Production
          package: ./deploy